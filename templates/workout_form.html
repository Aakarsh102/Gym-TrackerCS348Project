{% extends 'base.html' %}

{% block title %}{{ 'Edit Workout' if workout else 'New Workout' }} - Gym Tracker{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>{{ '✏️ Edit Workout' if workout else '🆕 New Workout' }}</h2>
    <form method="POST">
        <div class="form-group">
            <label for="date">Workout Date</label>
            <input type="date" name="date" id="date" value="{{ workout.date.strftime('%Y-%m-%d') if workout else '' }}" required>
        </div>
        <div class="form-group">
            <label for="duration_minutes">Duration (Minutes)</label>
            <input type="number" name="duration_minutes" id="duration_minutes" value="{{ workout.duration_minutes if workout else '' }}">
        </div>
        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea name="notes" id="notes" rows="3">{{ workout.notes if workout else '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">{{ 'Update Workout' if workout else 'Create Workout' }}</button>
        <a href="{{ url_for('list_workouts') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
