{% extends 'base.html' %}

{% block title %}Edit Exercise Log - Gym Tracker{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>✏️ Edit {{ we.exercise.name }}</h2>
    <form method="POST">
        <div class="form-group">
            <label for="sets">Sets</label>
            <input type="number" name="sets" id="sets" min="1" value="{{ we.sets }}">
        </div>
        <div class="form-group">
            <label for="reps">Reps</label>
            <input type="number" name="reps" id="reps" min="1" value="{{ we.reps }}">
        </div>
        <div class="form-group">
            <label for="weight">Weight (lbs)</label>
            <input type="number" step="0.5" name="weight" id="weight" min="0" value="{{ we.weight }}">
        </div>
        <button type="submit" class="btn btn-primary">Update Log</button>
        <a href="{{ url_for('view_workout', id=we.workout_session_id) }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
